name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# All third-party actions are SHA-pinned per Gateway org policy + NFR-07.
env:
  GO_VERSION: "1.25"
  BUF_VERSION: "v1.55.0"
  PROTOC_GEN_GO_VERSION: "v1.36.0"
  PROTOC_GEN_GO_GRPC_VERSION: "v1.5.1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      next_tag: ${{ steps.next_tag.outputs.next_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install buf + protoc plugins (pinned)
        run: |
          go install github.com/bufbuild/buf/cmd/buf@${{ env.BUF_VERSION }}
          go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@${{ env.PROTOC_GEN_GO_GRPC_VERSION }}

      - name: Generate Go stubs from ./protocols
        run: make proto-gen

      - name: Lint
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.11.4

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Determine next tag (semantic)
        id: next_tag
        shell: bash
        run: |
          git fetch --tags

          last_tag=$(git tag --list 'v[0-9]*' | sort -V | tail -n 1)

          if [ -z "$last_tag" ]; then
            echo "next_tag=v1.0.0" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          commits=$(git log "${last_tag}..HEAD" --format='%s' || true)

          bump="patch"
          if echo "$commits" | grep -Eqi 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$commits" | grep -Eqi '^feat(\(|:|!|$)|^feature(\(|:|!|$)'; then
            bump="minor"
          fi
          if echo "$commits" | grep -Eq '^[a-zA-Z]+!:'; then
            bump="major"
          fi

          version=${last_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          : "${major:=1}"
          : "${minor:=0}"
          : "${patch:=0}"

          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=$next_tag" | tee -a "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.next_tag.outputs.next_tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ needs.prepare.outputs.next_tag }}
          generate_release_notes: true
          name: Release ${{ needs.prepare.outputs.next_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
