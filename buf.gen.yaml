version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/asolovov/evm-oracle-demo-indexer-service/internal/genproto
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.0
    out: internal/genproto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.5.1
    out: internal/genproto
    opt:
      - paths=source_relative
